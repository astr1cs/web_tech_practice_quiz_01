<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>University Online Admission Form</title>
</head>
<body>

  <h1>University Online Admission Form</h1>

  <form action="#" method="post" enctype="multipart/form-data">

    <!-- Personal Information Section -->
    <fieldset>
      <legend>Personal Information</legend>

      <label for="firstName">First Name:</label><br>
      <input type="text" id="firstName" name="firstName" maxlength="30" required><br><br>

      <label for="lastName">Last Name:</label><br>
      <input type="text" id="lastName" name="lastName" maxlength="30" required><br><br>

      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email" required><br><br>

      <label for="dob">Date of Birth:</label><br>
      <input type="date" id="dob" name="dob" required><br><br>

      <label>Gender:</label><br>
      <input type="radio" id="male" name="gender" value="Male" required>
      <label for="male">Male</label>
      <input type="radio" id="female" name="gender" value="Female">
      <label for="female">Female</label>
      <input type="radio" id="other" name="gender" value="Other">
      <label for="other">Other</label><br><br>

      <label for="phone">Phone Number:</label><br>
      <input type="text" id="phone" name="phone" maxlength="15" required><br><br>

      <label for="address">Address:</label><br>
      <input type="text" id="address" name="address" maxlength="100"><br><br>
    </fieldset>

    <!-- Academic Information Section -->
    <fieldset>
      <legend>Academic Information</legend>

      <label for="highSchool">High School Name:</label><br>
      <input type="text" id="highSchool" name="highSchool" maxlength="50" required><br><br>

      <label for="yearOfPassing">Year of Passing:</label><br>
      <input type="number" id="yearOfPassing" name="yearOfPassing" min="2000" max="2030" required><br><br>

      <label for="cgpa">CGPA / Percentage:</label><br>
      <input type="text" id="cgpa" name="cgpa" maxlength="5" required><br><br>

      <label for="interests">Interests / Activities:</label><br>
      <input type="checkbox" id="sports" name="interests" value="Sports">
      <label for="sports">Sports</label>
      <input type="checkbox" id="music" name="interests" value="Music">
      <label for="music">Music</label>
      <input type="checkbox" id="arts" name="interests" value="Arts">
      <label for="arts">Arts</label>
      <input type="checkbox" id="science" name="interests" value="Science">
      <label for="science">Science</label><br><br>

      <label for="department">Preferred Department:</label><br>
      <select id="department" name="department" required>
        <option value="">--Select Department--</option>
        <option value="Computer Science">Computer Science</option>
        <option value="Electronics">Electronics</option>
        <option value="Mechanical">Mechanical</option>
        <option value="Business">Business Administration</option>
      </select><br><br>

      <label for="documents">Upload Documents (Resume / Transcript):</label><br>
      <input type="file" id="documents" name="documents" accept=".pdf,.doc,.docx" required><br><br>

    </fieldset>

    <!-- Submit / Reset Buttons -->
    <button type="submit">Submit</button>
    <button type="reset">Reset</button>

  </form>

</body>
</html>
