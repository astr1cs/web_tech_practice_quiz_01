<!doctype html>
<html>
  <head>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      #mainBox {
        display: inline-block;
        height: 150px;
        width: 100%;
        background-color: blue;
      }
      #laptop {
        margin: 10px 10px;
        padding: 10px;
        display: inline-block;
        border: 3px solid gray;
        background-color: red;
        text-align: center;
      }
      #laptop:hover {
        outline: 2px solid white;
        outline-offset: 5px;
      }

      #headphones {
        margin: 10px 10px;
        padding: 10px;
        display: inline-block;
        border: 3px solid gray;
        background-color: aqua;
        text-align: center;
      }
      #headphones:hover {
            outline: 2px solid white;
        outline-offset: 5px;
      }
      #smartwatch {
        margin: 10px 10px;
        padding: 10px;
        text-align: center;
        display: inline-block;
        border: 3px solid gray;
        background-color: rgb(47, 47, 133);
      }

      #smartwatch:hover {
        outline: 2px solid white;
        outline-offset: 5px;
      }
    </style>
  </head>
  <body>
    <main id="mainBox">
      <div id="laptop">
        <h2>Product name</h2>
        <p>Short Description about the project</p>
        <p>Price: $500</p>
        <p>Image:</p>
        <img src="./img.jpg" />
        <a href="#buy" target="_blank">Buy Now</a>
      </div>
      <div id="headphones">
        <h2>Product name</h2>
        <p>Short Description about the project</p>
        <p>Price: $500</p>
        <p>Image:</p>
        <img src="./img.jpg" />
        <a href="#buy" target="_blank">Buy Now</a>
      </div>
      <div id="smartwatch">
        <h2>Product name</h2>
        <p>Short Description about the project</p>
        <p>Price: $500</p>
        <p>Image:</p>
        <img src="./img.jpg" />
        <a href="#buy" target="_blank">Buy Now</a>
      </div>
    </main>
  </body>
</html>
